name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify award image metadata
        run: node scripts/update-image-metadata.mjs --check

      - name: Run tests
        run: node --test tests/*.mjs
