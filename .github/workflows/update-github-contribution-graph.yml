name: Update GitHub Contribution Graph

on:
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-github-contribution-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch GitHub contribution data
        run: python scripts/fetch-github-contributions.py
        env:
          GH_PROFILE_TOKEN: ${{ secrets.GH_PROFILE_TOKEN }}

      - name: Generate GitHub contribution graph
        run: python scripts/generate-github-contribution-graph.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-contributions.json assets/github-contribution-graph.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update github contribution graph [skip ci]" -m "Co-authored-by: ceilf6 <3506456886@qq.com>"
            git push
          fi
