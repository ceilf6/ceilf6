name: Update GitHub Contribution Graph

on:
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch:
    inputs:
      sync_linuxdo:
        description: "Upload and apply the current compact graph to the Linux DO signature"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update-github-contribution-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch GitHub contribution data
        run: python scripts/fetch-github-contributions.py
        env:
          GH_PROFILE_TOKEN: ${{ secrets.GH_PROFILE_TOKEN }}

      - name: Generate GitHub contribution graph
        run: python scripts/generate-github-contribution-graph.py

      - name: Detect Linux DO sync configuration
        id: linuxdo-sync
        env:
          LINUXDO_SESSION_COOKIE: ${{ secrets.LINUXDO_SESSION_COOKIE }}
          LINUXDO_SYNC_ENABLED: ${{ secrets.LINUXDO_SYNC_ENABLED }}
          LINUXDO_MANUAL_SYNC: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_linuxdo || 'false' }}
        run: |
          if [ "$LINUXDO_MANUAL_SYNC" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Linux DO sync manually requested."
          elif git diff --quiet -- assets/github-contribution-graph-compact.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Linux DO sync skipped: compact graph is unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -z "$LINUXDO_SESSION_COOKIE" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Linux DO sync is not configured; add LINUXDO_SESSION_COOKIE to enable it."
          elif [ "$LINUXDO_MANUAL_SYNC" = "true" ] || [ "$LINUXDO_SYNC_ENABLED" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Linux DO sync is disabled; manually dispatch with sync_linuxdo=true to test it first."
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-contributions.json assets/github-contribution-graph.svg assets/github-contribution-graph-compact.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update github contribution graph [skip ci]" -m "Co-authored-by: ceilf6 <3506456886@qq.com>"
            git push
          fi

      - name: Sync Linux DO signature
        if: ${{ steps.linuxdo-sync.outputs.changed == 'true' && steps.linuxdo-sync.outputs.configured == 'true' }}
        env:
          LINUXDO_SESSION_COOKIE: ${{ secrets.LINUXDO_SESSION_COOKIE }}
        run: python scripts/sync-linuxdo-signature.py --image assets/github-contribution-graph-compact.svg --username ceilf6
