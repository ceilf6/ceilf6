name: Update Stats

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper beautifulsoup4

      - name: Update award image metadata
        run: node scripts/update-image-metadata.mjs

      - name: Fetch Bilibili stats
        id: fetch-bilibili
        continue-on-error: true
        run: python scripts/fetch-bilibili-stats-1.py
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
          BILI_BILI_JCT: ${{ secrets.BILI_BILI_JCT }}

      - name: Fetch CSDN stats
        id: fetch-csdn
        continue-on-error: true
        run: python scripts/fetch-csdn-stats-2.py

      - name: Fetch GitHub stats card
        id: fetch-github
        continue-on-error: true
        run: python scripts/fetch-github-stats-card.py

      - name: Fetch Hugging Face stats
        id: fetch-huggingface
        continue-on-error: true
        run: python scripts/fetch-huggingface-stats.py

      - name: Generate SVG cards
        run: python scripts/generate-svg-cards.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update stats [skip ci]" -m "Co-authored-by: ceilf6 <3506456886@qq.com>"
            git push
          fi

      - name: Report fetch failures
        if: always()
        env:
          FETCH_BILIBILI_OUTCOME: ${{ steps.fetch-bilibili.outcome }}
          FETCH_CSDN_OUTCOME: ${{ steps.fetch-csdn.outcome }}
          FETCH_GITHUB_OUTCOME: ${{ steps.fetch-github.outcome }}
          FETCH_HUGGINGFACE_OUTCOME: ${{ steps.fetch-huggingface.outcome }}
        run: |
          failed_sources=()

          if [[ "$FETCH_BILIBILI_OUTCOME" == "failure" ]]; then
            failed_sources+=("Bilibili")
          fi
          if [[ "$FETCH_CSDN_OUTCOME" == "failure" ]]; then
            failed_sources+=("CSDN")
          fi
          if [[ "$FETCH_GITHUB_OUTCOME" == "failure" ]]; then
            failed_sources+=("GitHub Stats")
          fi
          if [[ "$FETCH_HUGGINGFACE_OUTCOME" == "failure" ]]; then
            failed_sources+=("Hugging Face")
          fi

          if ((${#failed_sources[@]} > 0)); then
            failed_list=$(IFS=,; echo "${failed_sources[*]}")
            echo "::error::Stats fetch failed for: $failed_list"
            exit 1
          fi

          echo "All stats sources fetched successfully"
