<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./assets/Profile.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <title>王景宏简历附件</title>
    <style>
      :root {
        --bg-void: #050914;
        --bg-deep: #0c1730;
        --bg-midnight: #132541;
        --text-main: #eef4ff;
        --text-muted: #afc3dd;
        --accent-cyan: #57e3cf;
        --accent-amber: #ffb262;
        --panel-bg: rgba(8, 19, 36, 0.56);
        --panel-border: rgba(171, 212, 240, 0.24);
        --card-shadow: 0 22px 44px rgba(1, 8, 20, 0.45);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            120% 130% at 8% 6%,
            rgba(255, 178, 98, 0.24) 0%,
            transparent 44%
          ),
          radial-gradient(
            120% 150% at 95% 8%,
            rgba(86, 227, 207, 0.22) 0%,
            transparent 48%
          ),
          radial-gradient(
            90% 140% at 48% 100%,
            rgba(104, 145, 255, 0.14) 0%,
            transparent 56%
          ),
          linear-gradient(
            138deg,
            var(--bg-void) 0%,
            var(--bg-deep) 44%,
            var(--bg-midnight) 100%
          );
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow-x: hidden;
        font-family:
          "Azeret Mono", "Noto Sans SC", "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }

      .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px 40px 20px;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(145, 184, 214, 0.09) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(145, 184, 214, 0.08) 1px,
            transparent 1px
          );
        background-size: 38px 38px;
        opacity: 0.32;
        mix-blend-mode: screen;
        animation: gridPulse 18s ease-in-out infinite;
        z-index: 0;
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: -20% -10%;
        background:
          radial-gradient(
            38% 44% at 14% 72%,
            rgba(255, 178, 98, 0.26) 0%,
            transparent 100%
          ),
          radial-gradient(
            42% 50% at 83% 18%,
            rgba(87, 227, 207, 0.24) 0%,
            transparent 100%
          ),
          radial-gradient(
            40% 42% at 44% 48%,
            rgba(120, 166, 255, 0.18) 0%,
            transparent 100%
          );
        filter: blur(10px);
        animation: floatOrbs 22s ease-in-out infinite;
        z-index: 0;
        pointer-events: none;
      }

      @keyframes gridPulse {
        0%,
        100% {
          opacity: 0.24;
        }

        50% {
          opacity: 0.4;
        }
      }

      @keyframes floatOrbs {
        0%,
        100% {
          transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        }

        25% {
          transform: translate3d(2.5%, 3%, 0) rotate(4deg) scale(1.02);
        }

        50% {
          transform: translate3d(-2%, 1.5%, 0) rotate(-3deg) scale(0.98);
        }

        75% {
          transform: translate3d(3.5%, -2.5%, 0) rotate(2deg) scale(1.01);
        }
      }

      /* 瀑布流布局 */
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        column-gap: 24px;
        grid-auto-rows: 1px;
        max-width: 1400px;
        width: 100%;
        position: relative;
        z-index: 1;
        padding: 48px 100px 56px;
      }

      .gallery .card {
        aspect-ratio: unset;
        height: auto;
        margin-bottom: 24px;
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        transform-style: preserve-3d;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        background: linear-gradient(
          160deg,
          rgba(10, 24, 42, 0.86),
          rgba(15, 33, 56, 0.56)
        );
        backdrop-filter: blur(8px) saturate(120%);
        -webkit-backdrop-filter: blur(8px) saturate(120%);
        border: 1px solid var(--panel-border);
        box-shadow: var(--card-shadow);
        opacity: 0;
        animation: cardIn 0.6s ease forwards;
      }

      .gallery .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 10%,
          rgba(255, 255, 255, 0.12) 48%,
          transparent 70%
        );
        transform: translateX(-140%);
        transition: transform 0.6s ease;
        z-index: 2;
        pointer-events: none;
      }

      .gallery .card:hover {
        box-shadow:
          0 22px 54px rgba(2, 8, 20, 0.52),
          0 0 0 1px rgba(87, 227, 207, 0.45);
        border-color: rgba(87, 227, 207, 0.48);
        transform: translateY(-8px) scale(1.01);
      }

      .gallery .card:hover::before {
        transform: translateX(120%);
      }

      .gallery .card img {
        width: 100%;
        height: auto;
        object-fit: contain;
        border-radius: 18px;
        transition: transform 0.6s ease, filter 0.6s ease;
      }

      .gallery .card:hover img {
        transform: scale(1.05);
        filter: saturate(1.08) contrast(1.04);
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(40px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 延迟动画 */
      .gallery .card:nth-child(1) {
        animation-delay: 0.05s;
      }

      .gallery .card:nth-child(2) {
        animation-delay: 0.1s;
      }

      .gallery .card:nth-child(3) {
        animation-delay: 0.15s;
      }

      .gallery .card:nth-child(4) {
        animation-delay: 0.2s;
      }

      .gallery .card:nth-child(5) {
        animation-delay: 0.25s;
      }

      .gallery .card:nth-child(6) {
        animation-delay: 0.3s;
      }

      .gallery .card:nth-child(7) {
        animation-delay: 0.35s;
      }

      .gallery .card:nth-child(8) {
        animation-delay: 0.4s;
      }

      .gallery .card:nth-child(9) {
        animation-delay: 0.45s;
      }

      .gallery .card:nth-child(10) {
        animation-delay: 0.5s;
      }

      .gallery .card:nth-child(11) {
        animation-delay: 0.55s;
      }

      /* README 区域 */
      .readme-section {
        width: 100%;
        background: var(--panel-bg);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        padding: 26px 24px;
        text-align: center;
        flex-shrink: 0;
        margin: 22px 22px 0;
        border-radius: 24px;
        box-shadow: 0 16px 40px rgba(2, 8, 22, 0.34);
        position: relative;
        z-index: 1;
      }

      .readme-section::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          130deg,
          rgba(87, 227, 207, 0.68),
          rgba(255, 178, 98, 0.58),
          rgba(87, 227, 207, 0.68)
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.58;
        pointer-events: none;
      }

      .readme-section h1 {
        font-size: clamp(22px, 2.2vw, 34px);
        color: var(--text-main);
        margin-bottom: 16px;
        font-family: "ZCOOL XiaoWei", "KaiTi", serif;
        letter-spacing: 1px;
        text-shadow: 0 8px 22px rgba(0, 0, 0, 0.36);
      }

      .readme-section h1 .accent {
        color: var(--accent-amber);
      }

      .readme-cards {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .readme-cards img {
        height: 200px;
        border-radius: 12px;
        border: 1px solid rgba(194, 220, 245, 0.34);
        box-shadow: 0 14px 30px rgba(3, 10, 24, 0.3);
        transition: transform 0.35s ease, box-shadow 0.35s ease;
      }

      .readme-cards img:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 18px 34px rgba(3, 10, 24, 0.44);
      }

      .readme-hint {
        text-align: center;
        margin-top: 12px;
      }

      .readme-hint img {
        height: 20px;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
      }

      @media (max-width: 900px) {
        .readme-section {
          margin: 16px 16px 0;
          border-radius: 20px;
        }

        .readme-cards img {
          height: 150px;
        }

        .gallery {
          padding: 40px 60px;
          column-count: 2;
        }

        @supports (grid-template-rows: masonry) {
          .gallery {
            grid-template-columns: repeat(2, 1fr);
          }
        }
      }

      @media (max-width: 640px) {
        .readme-section {
          padding: 16px;
          margin: 12px 12px 0;
          border-radius: 16px;
        }

        .readme-cards img {
          height: 120px;
        }

        .gallery {
          padding: 20px;
          column-count: 1;
        }

        @supports (grid-template-rows: masonry) {
          .gallery {
            grid-template-columns: 1fr;
          }
        }
      }
    </style>
  </head>

  <body>
    <!-- README 展示区域 -->
    <div class="readme-section">
      <h1>👋 Hi there, I'm <span class="accent">ceilf6</span>!</h1>
      <div class="readme-cards">
        <a href="https://github.com/ceilf6" target="_blank"
          ><img
            src="https://github-profile-summary-cards.vercel.app/api/cards/stats?username=ceilf6&theme=tokyonight"
            alt="Stats"
        /></a>
        <a href="https://blog.csdn.net/2301_78856868" target="_blank"
          ><img src="assets/blog-card.svg" alt="Blog"
        /></a>
        <a href="https://space.bilibili.com/3546602400647622" target="_blank"
          ><img src="assets/vlog-card.svg" alt="Vlog"
        /></a>
      </div>
      <div class="readme-hint">
        <img src="assets/hint-text-for-index.svg" alt="hint" />
      </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
      <!-- 瀑布流容器 -->
      <div class="gallery waterfall active" id="gallery"></div>
    </div>

    <script src="resume-awards/images.js"></script>
    <script>
      const gallery = document.getElementById("gallery");

      // 打开查看器页面
      function openViewer(id) {
        window.open(`viewer.html?img=${id}`, "_blank");
      }

      // 根据图片自然宽高比和列宽计算 span，实现从左到右的瀑布流
      function resizeCard(card, imgEl) {
        const ratio = imgEl.naturalHeight / imgEl.naturalWidth;
        const height = card.offsetWidth * ratio;
        card.style.gridRowEnd = "span " + Math.ceil(height + 24);
      }

      // 初始化瀑布流
      images.forEach((img, i) => {
        const card = document.createElement("div");
        card.className = "card";
        const imgEl = document.createElement("img");
        imgEl.src = img.src;
        imgEl.alt = img.alt;
        imgEl.addEventListener("load", () => resizeCard(card, imgEl));
        card.appendChild(imgEl);
        card.addEventListener("click", () => openViewer(i));
        gallery.appendChild(card);
      });

      // 窗口缩放时重新计算
      window.addEventListener("resize", () => {
        document.querySelectorAll(".gallery .card").forEach((card) => {
          const imgEl = card.querySelector("img");
          if (imgEl && imgEl.complete) resizeCard(card, imgEl);
        });
      });
    </script>
  </body>
</html>
