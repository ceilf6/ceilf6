<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./assets/Profile.jpg" />
    <title>王景宏简历附件</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #0c1929 0%,
          #1a365d 25%,
          #2563eb 50%,
          #7c3aed 75%,
          #1e1b4b 100%
        );
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow-x: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px 40px 20px;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            circle at 20% 80%,
            rgba(56, 189, 248, 0.3) 0%,
            transparent 25%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(139, 92, 246, 0.3) 0%,
            transparent 25%
          ),
          radial-gradient(
            circle at 40% 40%,
            rgba(34, 211, 238, 0.2) 0%,
            transparent 20%
          ),
          radial-gradient(
            circle at 60% 60%,
            rgba(99, 102, 241, 0.2) 0%,
            transparent 20%
          );
        animation: floatOrbs 20s ease-in-out infinite;
        z-index: 0;
        pointer-events: none;
      }

      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }
      }

      @keyframes floatOrbs {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }

        25% {
          transform: translate(2%, 3%) rotate(5deg);
        }

        50% {
          transform: translate(-1%, 2%) rotate(-3deg);
        }

        75% {
          transform: translate(3%, -2%) rotate(3deg);
        }
      }

      /* 瀑布流布局 */
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        column-gap: 24px;
        grid-auto-rows: 1px;
        max-width: 1400px;
        width: 100%;
        position: relative;
        z-index: 1;
        padding: 40px 100px;
      }

      .gallery .card {
        aspect-ratio: unset;
        height: auto;
        margin-bottom: 24px;
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        transform-style: preserve-3d;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
        opacity: 0;
        animation: cardIn 0.6s ease forwards;
      }

      .gallery .card:hover {
        box-shadow:
          0 15px 50px rgba(56, 189, 248, 0.4),
          0 0 30px rgba(139, 92, 246, 0.3);
        border-color: rgba(139, 92, 246, 0.5);
        transform: translateY(-8px);
      }

      .gallery .card img {
        width: 100%;
        height: auto;
        object-fit: contain;
        border-radius: 18px;
        transition: transform 0.6s ease;
      }

      .gallery .card:hover img {
        transform: scale(1.05);
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(40px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 延迟动画 */
      .gallery .card:nth-child(1) {
        animation-delay: 0.05s;
      }

      .gallery .card:nth-child(2) {
        animation-delay: 0.1s;
      }

      .gallery .card:nth-child(3) {
        animation-delay: 0.15s;
      }

      .gallery .card:nth-child(4) {
        animation-delay: 0.2s;
      }

      .gallery .card:nth-child(5) {
        animation-delay: 0.25s;
      }

      .gallery .card:nth-child(6) {
        animation-delay: 0.3s;
      }

      .gallery .card:nth-child(7) {
        animation-delay: 0.35s;
      }

      .gallery .card:nth-child(8) {
        animation-delay: 0.4s;
      }

      .gallery .card:nth-child(9) {
        animation-delay: 0.45s;
      }

      .gallery .card:nth-child(10) {
        animation-delay: 0.5s;
      }

      .gallery .card:nth-child(11) {
        animation-delay: 0.55s;
      }

      /* README 区域 */
      .readme-section {
        width: 100%;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        padding: 24px;
        text-align: center;
        flex-shrink: 0;
      }

      .readme-section h1 {
        font-size: 20px;
        color: #70a5fe;
        margin-bottom: 16px;
      }

      .readme-cards {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .readme-cards img {
        height: 200px;
        border-radius: 8px;
        transition: transform 0.3s ease;
      }

      .readme-cards img:hover {
        transform: scale(1.02);
      }

      .readme-hint {
        text-align: center;
        margin-top: 12px;
      }

      .readme-hint img {
        height: 20px;
      }

      @media (max-width: 900px) {
        .readme-cards img {
          height: 150px;
        }

        .gallery {
          padding: 40px 60px;
          column-count: 2;
        }

        @supports (grid-template-rows: masonry) {
          .gallery {
            grid-template-columns: repeat(2, 1fr);
          }
        }
      }

      @media (max-width: 640px) {
        .readme-section {
          padding: 16px;
        }

        .readme-cards img {
          height: 120px;
        }

        .gallery {
          padding: 20px;
          column-count: 1;
        }

        @supports (grid-template-rows: masonry) {
          .gallery {
            grid-template-columns: 1fr;
          }
        }
      }
    </style>
  </head>

  <body>
    <!-- README 展示区域 -->
    <div class="readme-section">
      <h1>👋 Hi there, I'm <span style="color: #bf91f3">ceilf6</span>!</h1>
      <div class="readme-cards">
        <a href="https://github.com/ceilf6" target="_blank"
          ><img
            src="https://github-profile-summary-cards.vercel.app/api/cards/stats?username=ceilf6&theme=tokyonight"
            alt="Stats"
        /></a>
        <a href="https://blog.csdn.net/2301_78856868" target="_blank"
          ><img src="assets/blog-card.svg" alt="Blog"
        /></a>
        <a href="https://space.bilibili.com/3546602400647622" target="_blank"
          ><img src="assets/vlog-card.svg" alt="Vlog"
        /></a>
      </div>
      <div class="readme-hint">
        <img src="assets/hint-text-for-index.svg" alt="hint" />
      </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
      <!-- 瀑布流容器 -->
      <div class="gallery waterfall active" id="gallery"></div>
    </div>

    <script src="resume-awards/images.js"></script>
    <script>
      const gallery = document.getElementById("gallery");

      // 打开查看器页面
      function openViewer(id) {
        window.open(`viewer.html?img=${id}`, "_blank");
      }

      // 根据图片自然宽高比和列宽计算 span，实现从左到右的瀑布流
      function resizeCard(card, imgEl) {
        const ratio = imgEl.naturalHeight / imgEl.naturalWidth;
        const height = card.offsetWidth * ratio;
        card.style.gridRowEnd = "span " + Math.ceil(height + 24);
      }

      // 初始化瀑布流
      images.forEach((img, i) => {
        const card = document.createElement("div");
        card.className = "card";
        const imgEl = document.createElement("img");
        imgEl.src = img.src;
        imgEl.alt = img.alt;
        imgEl.addEventListener("load", () => resizeCard(card, imgEl));
        card.appendChild(imgEl);
        card.addEventListener("click", () => openViewer(i));
        gallery.appendChild(card);
      });

      // 窗口缩放时重新计算
      window.addEventListener("resize", () => {
        document.querySelectorAll(".gallery .card").forEach((card) => {
          const imgEl = card.querySelector("img");
          if (imgEl && imgEl.complete) resizeCard(card, imgEl);
        });
      });
    </script>
  </body>
</html>
